version: '3.8'

services:
  blinko-website:
    image: blinkospace/blinko:latest
    container_name: blinko-website
    restart: always
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: http://13.222.177.31
      NEXT_PUBLIC_BASE_URL: http://13.222.177.31
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@blinko-db.ca76u2oiyg63.us-east-1.rds.amazonaws.com:5432/postgres
    ports:
      - "1111:1111"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1111/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
