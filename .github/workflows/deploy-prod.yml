name: Deploy Blinko Production

on:
  workflow_dispatch: # Manual trigger so it doesn't interfere with old deployment

jobs:
  deploy:
    runs-on: ubuntu-latest

    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to PROD EC2 and Restore DB
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.PROD_EC2_HOST }}
        username: ${{ secrets.PROD_EC2_USER }}
        key: ${{ secrets.PROD_EC2_SSH_KEY }}
        script: |
          # Install AWS CLI if missing
          if ! command -v aws &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y awscli
          fi

          # Configure AWS CLI
          aws configure set aws_access_key_id ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
          aws configure set default.region ${{ secrets.PROD_AWS_REGION }}

          # Install Docker if missing
          if ! command -v docker &> /dev/null; then
            curl -fsSL https://get.docker.com -o get-docker.sh && sh get-docker.sh
            sudo usermod -aG docker $USER
          fi

          # Install Docker Compose if missing
          if ! command -v docker-compose &> /dev/null; then
            sudo curl -SL https://github.com/docker/compose/releases/download/v2.23.3/docker-compose-linux-x86_64 -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          fi

          # Clone or update repo in separate prod folder
          if [ ! -d "blinko-prod" ]; then
            git clone https://github.com/Good-ie/blinko-app.git blinko-prod
            cd blinko-prod
          else
            cd blinko-prod
            git fetch origin main
            git reset --hard origin/main
          fi

          # Export secrets for docker-compose
          export DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}
          export NEXTAUTH_SECRET=${{ secrets.PROD_NEXTAUTH_SECRET }}

          # Create .env file (production)
          cat <<EOF > .env
          DB_PASSWORD=${DB_PASSWORD}
          NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
          DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@postgres:5432/postgres
          EOF

          # Stop and remove old containers/images for prod
          docker-compose -f docker-compose.prod.yml down --volumes --remove-orphans
          docker system prune -af

          # Start Blinko PROD containers
          docker-compose -f docker-compose.prod.yml up -d --build

          # Wait for Postgres
          echo "Waiting for PostgreSQL..."
          sleep 20

          # Download dump from S3 and restore for PROD
          aws s3 cp s3://${{ secrets.PROD_S3_BUCKET_NAME }}/blinko_backup.sql .
          if [ -f "blinko_backup.sql" ]; then
            echo "Restoring database..."
            docker exec -i blinko-postgres psql -U postgres postgres < blinko_backup.sql
            echo "Database restored successfully!"
            rm -f blinko_backup.sql
          else
            echo "No dump found in S3. Skipping restore."
          fi
