name: Deploy Blinko with Docker PostgreSQL

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1️⃣ Install required packages
          sudo yum update -y
          sudo yum install -y git

          # 2️⃣ Install Docker
          if ! command -v docker &> /dev/null; then
            curl -fsSL https://get.docker.com -o get-docker.sh && sh get-docker.sh
            sudo usermod -aG docker $USER
          fi

          # 3️⃣ Install Docker Compose
          if ! command -v docker-compose &> /dev/null; then
            sudo curl -L "https://github.com/docker/compose/releases/download/v2.23.3/docker-compose-linux-x86_64" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          fi

          # 4️⃣ Clone or update the repo
          if [ ! -d "blinko-app" ]; then
            git clone https://github.com/Good-ie/blinko-app.git
          fi
          cd blinko-app
          git pull origin main

          # 5️⃣ Create .env file
          echo "Creating .env file..."
          cat <<EOF > .env
          NEXTAUTH_URL=http://${{ secrets.EC2_HOST }}
          NEXT_PUBLIC_BASE_URL=http://${{ secrets.EC2_HOST }}
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DATABASE_URL=postgresql://postgres:${{ secrets.DB_PASSWORD }}@blinko-postgres:5432/postgres

          EOF

          # 6️⃣ Stop existing containers
          docker-compose down || true

          # 7️⃣ Start the app with Docker Compose
          docker-compose up -d --build

          echo "🚀 Deployment completed with Docker PostgreSQL!"
