name: Deploy Blinko with RDS DB Restore

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to EC2 and Restore RDS DB
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1️⃣ Update system and install required packages
          sudo yum update -y
          sudo yum install -y git awscli postgresql curl

          # 2️⃣ Configure AWS CLI
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set default.region ${{ secrets.AWS_REGION }}

          # 3️⃣ Install Docker & Docker Compose
          if ! command -v docker &> /dev/null; then
            curl -fsSL https://get.docker.com -o get-docker.sh && sh get-docker.sh
            sudo usermod -aG docker $USER
            newgrp docker
          fi

          if ! command -v docker-compose &> /dev/null; then
            sudo curl -SL https://github.com/docker/compose/releases/download/v2.23.3/docker-compose-linux-x86_64 -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          fi

          # 4️⃣ Clone or update the repo
          if [ ! -d "blinko-app" ]; then
            git clone https://github.com/Good-ie/blinko-app.git
          fi
          cd blinko-app
          git pull origin main

          # 5️⃣ Create or overwrite .env file
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" > .env
          echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}" >> .env
          echo "RDS_ENDPOINT=${{ secrets.RDS_ENDPOINT }}" >> .env
          echo "NEXTAUTH_URL=http://${{ secrets.EC2_HOST }}" >> .env
          echo "NEXT_PUBLIC_BASE_URL=http://${{ secrets.EC2_HOST }}" >> .env

          # 6️⃣ Write docker-compose.yml
          cat <<EOF > docker-compose.yml
          version: '3.8'

          services:
            blinko-website:
              image: blinkospace/blinko:latest
              container_name: blinko-website
              restart: always
              ports:
                - "1111:3000"
              environment:
                NODE_ENV: production
                NEXTAUTH_URL: http://${{ secrets.EC2_HOST }}
                NEXT_PUBLIC_BASE_URL: http://${{ secrets.EC2_HOST }}
                NEXTAUTH_SECRET: \${NEXTAUTH_SECRET}
                DB_PASSWORD: \${DB_PASSWORD}
                DATABASE_URL: postgresql://postgres:\${DB_PASSWORD}@\${RDS_ENDPOINT}:5432/postgres
              healthcheck:
                test: ["CMD", "curl", "-f", "http://localhost:3000/"]
                interval: 30s
                timeout: 10s
                retries: 5
                start_period: 30s
          EOF

          # 7️⃣ Start containers
          docker-compose down
          docker-compose up -d

          # 8️⃣ Wait and restore DB
          echo "Waiting for RDS to be ready..."
          sleep 30
          aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}/blinko_backup.sql .

          if [ -f "blinko_backup.sql" ]; then
            echo "Restoring database..."
            PGPASSWORD=${{ secrets.DB_PASSWORD }} psql -h ${{ secrets.RDS_ENDPOINT }} -U postgres -d postgres < blinko_backup.sql
            echo "✅ Database restored."
            rm -f blinko_backup.sql
          else
            echo "⚠️ No DB backup file found. Skipping restore."
          fi
