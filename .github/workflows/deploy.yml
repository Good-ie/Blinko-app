name: Deploy Blinko with S3 DB Restore

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to EC2 and Restore DB
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "🚀 Starting deployment on EC2..."

          # -------------------------------
          # 1️⃣ Install required packages
          # -------------------------------
          sudo yum update -y
          if ! command -v git &> /dev/null; then
            sudo yum install git -y
          fi
          if ! command -v aws &> /dev/null; then
            sudo yum install -y awscli
          fi

          # Configure AWS CLI
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set default.region ${{ secrets.AWS_REGION }}

          # Install Docker
          if ! command -v docker &> /dev/null; then
            curl -fsSL https://get.docker.com -o get-docker.sh && sh get-docker.sh
            sudo usermod -aG docker $USER
          fi

          # Install Docker Compose
          if ! command -v docker-compose &> /dev/null; then
            sudo curl -SL https://github.com/docker/compose/releases/download/v2.23.3/docker-compose-linux-x86_64 -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          fi

          # -------------------------------
          # 2️⃣ Clone or update repo
          # -------------------------------
          if [ ! -d "blinko-app" ]; then
            git clone https://github.com/Good-ie/blinko-app.git
            cd blinko-app
          else
            cd blinko-app
            git pull origin main
          fi

          # -------------------------------
          # 3️⃣ Setup environment variables
          # -------------------------------
          export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          export NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}

          cat <<EOF > .env
          DB_PASSWORD=$DB_PASSWORD
          NEXTAUTH_SECRET=$NEXTAUTH_SECRET
          EOF

          # Ensure Postgres data folder exists and has proper permissions
          mkdir -p ./postgres-data
          sudo chown -R 999:999 ./postgres-data

          # -------------------------------
          # 4️⃣ Start Postgres first
          # -------------------------------
          echo "🐘 Starting PostgreSQL..."
          docker-compose up -d postgres

          echo "⏳ Waiting for PostgreSQL to become healthy..."
          for i in {1..10}; do
            if docker exec blinko-postgres pg_isready -U postgres; then
              echo "✅ PostgreSQL is ready!"
              break
            fi
            echo "Waiting... ($i/10)"
            sleep 5
          done

          # -------------------------------
          # 5️⃣ Restore database from S3
          # -------------------------------
          echo "📥 Downloading DB dump from S3..."
          aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}/blinko_backup.sql .

          if [ -f "blinko_backup.sql" ]; then
            echo "🛠 Restoring database..."
            docker exec -i blinko-postgres psql -U postgres postgres < blinko_backup.sql || { echo "❌ DB restore failed"; exit 1; }
            echo "✅ Database restored successfully!"
            rm -f blinko_backup.sql
          else
            echo "⚠️ No dump found in S3. Skipping restore."
          fi

          # -------------------------------
          # 6️⃣ Start Blinko App
          # -------------------------------
          echo "🚀 Starting Blinko app..."
          docker-compose up -d --build blinko-website

          echo "🎉 Deployment complete! Blinko is live."
