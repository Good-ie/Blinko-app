name: Deploy Blinko with S3 DB Restore

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to EC2 and Restore DB
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST_IPV4 }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Install AWS CLI if missing
          if ! command -v aws &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y awscli
          fi

          # Configure AWS CLI
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set default.region ${{ secrets.AWS_REGION }}

          # Install Docker if missing
          if ! command -v docker &> /dev/null; then
            curl -fsSL https://get.docker.com -o get-docker.sh && sh get-docker.sh
            sudo usermod -aG docker $USER
          fi

          # Install Docker Compose if missing
          if ! command -v docker-compose &> /dev/null; then
            sudo curl -SL https://github.com/docker/compose/releases/download/v2.23.3/docker-compose-linux-x86_64 -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          fi

          # Clone or update repo
          if [ ! -d "blinko-app" ]; then
            git clone https://github.com/goodie321/blinko-app.git
            cd blinko-app
          else
            cd blinko-app
            git pull origin main
          fi

          # Export secrets for docker-compose
          export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          export NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}

          # Create .env file
          cat <<EOF > .env
          DB_PASSWORD=$DB_PASSWORD
          NEXTAUTH_SECRET=$NEXTAUTH_SECRET
          EOF

          # Start Blinko containers
          docker-compose down
          docker-compose up -d --build

          # Wait for Postgres
          echo "Waiting for PostgreSQL..."
          sleep 20

          # Download dump from S3 and restore
          aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}/blinko_backup.sql .
          if [ -f "blinko_backup.sql" ]; then
            echo "Restoring database..."
            docker exec -i blinko-postgres psql -U postgres postgres < blinko_backup.sql
            echo "Database restored successfully!"
            rm -f blinko_backup.sql
          else
            echo "No dump found in S3. Skipping restore."
          fi

