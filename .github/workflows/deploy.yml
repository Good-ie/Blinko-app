name: Deploy Blinko with RDS DB Restore

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to EC2 and Restore RDS DB
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1️⃣ Update system and install required packages
          sudo yum update -y
          if ! command -v git &> /dev/null; then
            sudo yum install git -y
          fi
          if ! command -v aws &> /dev/null; then
            sudo yum install awscli -y
          fi
          if ! command -v psql &> /dev/null; then
            sudo yum install postgresql -y
          fi

          # 2️⃣ Configure AWS CLI
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set default.region ${{ secrets.AWS_REGION }}

          # 3️⃣ Install Docker & Docker Compose if missing
          if ! command -v docker &> /dev/null; then
            curl -fsSL https://get.docker.com -o get-docker.sh && sh get-docker.sh
            sudo usermod -aG docker $USER
          fi
          if ! command -v docker-compose &> /dev/null; then
            sudo curl -SL https://github.com/docker/compose/releases/download/v2.23.3/docker-compose-linux-x86_64 -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          fi

          # 4️⃣ Clone or update the repo
          if [ ! -d "blinko-app" ]; then
            git clone https://github.com/Good-ie/blinko-app.git
            cd blinko-app
          else
            cd blinko-app
            git pull origin main
          fi

          # 5️⃣ Create .env file for app
          export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          export NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          export RDS_ENDPOINT=${{ secrets.RDS_ENDPOINT }}

          cat <<EOF > .env
          DB_PASSWORD=$DB_PASSWORD
          NEXTAUTH_SECRET=$NEXTAUTH_SECRET
          RDS_ENDPOINT=$RDS_ENDPOINT
          EOF

          # 6️⃣ Update docker-compose to use RDS
          sed -i "s|DATABASE_URL:.*|DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@${RDS_ENDPOINT}:5432/postgres|" docker-compose.yml

          # 7️⃣ Start Blinko container
          docker-compose down
          docker-compose up -d --build

          # 8️⃣ Restore DB dump into RDS
          echo "Waiting for RDS to be ready..."
          sleep 20
          aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}/blinko_backup.sql .
          if [ -f "blinko_backup.sql" ]; then
            echo "Restoring database into RDS..."
            PGPASSWORD=$DB_PASSWORD psql -h $RDS_ENDPOINT -U postgres -d postgres < blinko_backup.sql
            echo "Database restored successfully!"
            rm -f blinko_backup.sql
          else
            echo "No dump found in S3. Skipping restore."
          fi
