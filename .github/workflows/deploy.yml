name: Deploy Blinko with RDS DB Restore

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to EC2 and Restore RDS DB
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1️⃣ Install required packages
          sudo yum update -y
          sudo yum install -y git awscli postgresql

          # 2️⃣ Install Docker if not installed
          if ! command -v docker &> /dev/null; then
            curl -fsSL https://get.docker.com -o get-docker.sh && sh get-docker.sh
            sudo usermod -aG docker $USER
          fi

          # 3️⃣ Install Docker Compose
          if ! command -v docker-compose &> /dev/null; then
            sudo curl -L "https://github.com/docker/compose/releases/download/v2.23.3/docker-compose-linux-x86_64" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          fi

          # 4️⃣ Set up AWS CLI
          mkdir -p ~/.aws
          echo "[default]" > ~/.aws/credentials
          echo "aws_access_key_id = ${{ secrets.AWS_ACCESS_KEY_ID }}" >> ~/.aws/credentials
          echo "aws_secret_access_key = ${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> ~/.aws/credentials
          echo "[default]" > ~/.aws/config
          echo "region = ${{ secrets.AWS_REGION }}" >> ~/.aws/config

          # 5️⃣ Clone or update repo
          if [ ! -d "blinko-app" ]; then
            git clone https://github.com/Good-ie/blinko-app.git
          fi
          cd blinko-app
          git pull origin main

          # 6️⃣ Create Docker Compose file (if needed) or ensure .env is configured
          echo "Creating .env file..."
          cat <<EOF > .env
          NEXTAUTH_URL=http://${{ secrets.EC2_HOST }}
          NEXT_PUBLIC_BASE_URL=http://${{ secrets.EC2_HOST }}
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DATABASE_URL=postgresql://postgres:${{ secrets.DB_PASSWORD }}@${{ secrets.RDS_ENDPOINT }}:5432/postgres
          EOF

          # 7️⃣ Stop old containers
          docker-compose down || true

          # 8️⃣ Start app
          docker-compose up -d --build

          # 9️⃣ Wait and restore database
          echo "Waiting for DB to accept connections..."
          sleep 20
          aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}/blinko_backup.sql .

          if [ -f "blinko_backup.sql" ]; then
            echo "Restoring database into RDS..."
            PGPASSWORD=${{ secrets.DB_PASSWORD }} psql -h ${{ secrets.RDS_ENDPOINT }} -U postgres -d postgres < blinko_backup.sql
            echo "Database restored!"
            rm -f blinko_backup.sql
          else
            echo "No SQL dump found. Skipping restore."
          fi
