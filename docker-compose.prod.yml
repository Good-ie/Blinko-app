version: '3.8'

networks:
  blinko-network:
    driver: bridge

services:
  blinko-website:
    image: blinkospace/blinko:latest
    container_name: blinko-website
    environment:
      NODE_ENV: production
      NEXTAUTH_URL:  http://blinko.devopsthepracticalway.club
      NEXT_PUBLIC_BASE_URL:  http://blinko.devopsthepracticalway.club
      NEXTAUTH_SECRET: ${PROD_NEXTAUTH_SECRET}
      DATABASE_URL: postgresql://postgres:${PROD_DB_PASSWORD}@postgres:5432/postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "1111:3000"
    restart: always
    networks:
      - blinko-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:14
    container_name: blinko-postgres
    restart: always
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - blinko-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "postgres"]
      interval: 5s
      timeout: 10s
      retries: 5
